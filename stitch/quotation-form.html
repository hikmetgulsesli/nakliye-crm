<!DOCTYPE html>

<html lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Yeni Teklif Oluşturma Formu</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;family=Karla:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1e3fae",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121520",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"],
                        "body": ["Karla", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Karla', sans-serif; }
        h1, h2, h3, h4, h5, h6, .font-display { font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<div class="px-4 md:px-10 lg:px-40 flex flex-1 justify-center py-5">
<div class="layout-content-container flex flex-col w-full max-w-[960px] flex-1 bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800">
<!-- Header -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 px-6 py-4">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500 transition-colors">
<span class="material-symbols-outlined text-xl">arrow_back</span>
</button>
<h2 class="text-xl font-display font-bold leading-tight tracking-tight">Yeni Teklif</h2>
</div>
<button class="flex items-center justify-center p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500 transition-colors">
<span class="material-symbols-outlined text-xl">close</span>
</button>
</header>
<!-- Form Content -->
<div class="p-6 space-y-8">
<!-- Section 1: Teklif Bilgileri -->
<section>
<h3 class="text-lg font-display font-bold mb-4 flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-xl">description</span>
                                Teklif Bilgileri
                            </h3>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="col-span-1 md:col-span-2">
<label class="block text-sm font-medium mb-1.5 text-slate-700 dark:text-slate-300">Bağlı Müşteri</label>
<div class="relative flex w-full">
<input class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-2.5 text-sm focus:border-primary focus:ring-1 focus:ring-primary dark:text-white" placeholder="Müşteri seçin veya arayın" type="text"/>
<div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-slate-400">
<span class="material-symbols-outlined text-xl">expand_more</span>
</div>
</div>
</div>
<div>
<label class="block text-sm font-medium mb-1.5 text-slate-700 dark:text-slate-300">Teklif Tarihi</label>
<div class="relative">
<input class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-2.5 text-sm focus:border-primary focus:ring-1 focus:ring-primary dark:text-white" type="date"/>
</div>
</div>
<div>
<label class="block text-sm font-medium mb-1.5 text-slate-700 dark:text-slate-300">Geçerlilik Tarihi</label>
<div class="relative">
<input class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-2.5 text-sm focus:border-primary focus:ring-1 focus:ring-primary dark:text-white" type="date"/>
</div>
</div>
</div>
</section>
<hr class="border-slate-200 dark:border-slate-800"/>
<!-- Section 2: Yük Hareketi -->
<section>
<h3 class="text-lg font-display font-bold mb-4 flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-xl">local_shipping</span>
                                Yük Hareketi
                            </h3>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div>
<label class="block text-sm font-medium mb-1.5 text-slate-700 dark:text-slate-300">Taşıma Modu</label>
<select class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-2.5 text-sm focus:border-primary focus:ring-1 focus:ring-primary dark:text-white appearance-none">
<option disabled="" selected="" value="">Seçiniz</option>
<option>Denizyolu</option>
<option>Havayolu</option>
<option>Karayolu</option>
</select>
</div>
<div>
<label class="block text-sm font-medium mb-1.5 text-slate-700 dark:text-slate-300">Servis Tipi</label>
<select class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-2.5 text-sm focus:border-primary focus:ring-1 focus:ring-primary dark:text-white appearance-none">
<option disabled="" selected="" value="">Seçiniz</option>
<option>FCL</option>
<option>LCL</option>
</select>
</div>
<div>
<label class="block text-sm font-medium mb-1.5 text-slate-700 dark:text-slate-300">Çıkış Ülkesi</label>
<select class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-2.5 text-sm focus:border-primary focus:ring-1 focus:ring-primary dark:text-white appearance-none">
<option disabled="" selected="" value="">Ülke Seçiniz</option>
<option>Türkiye</option>
<option>Çin</option>
</select>
</div>
<div>
<label class="block text-sm font-medium mb-1.5 text-slate-700 dark:text-slate-300">POL - Liman</label>
<input class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-2.5 text-sm focus:border-primary focus:ring-1 focus:ring-primary dark:text-white" placeholder="Çıkış limanı giriniz" type="text"/>
</div>
<div>
<label class="block text-sm font-medium mb-1.5 text-slate-700 dark:text-slate-300">Varış Ülkesi</label>
<select class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-2.5 text-sm focus:border-primary focus:ring-1 focus:ring-primary dark:text-white appearance-none">
<option disabled="" selected="" value="">Ülke Seçiniz</option>
<option>Almanya</option>
<option>ABD</option>
</select>
</div>
<div>
<label class="block text-sm font-medium mb-1.5 text-slate-700 dark:text-slate-300">POD - Varış Limanı</label>
<input class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-2.5 text-sm focus:border-primary focus:ring-1 focus:ring-primary dark:text-white" placeholder="Varış limanı giriniz" type="text"/>
</div>
<div class="col-span-1 md:col-span-2">
<label class="block text-sm font-medium mb-1.5 text-slate-700 dark:text-slate-300">Satış Şekli - Incoterm</label>
<select class="w-full md:w-1/2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-2.5 text-sm focus:border-primary focus:ring-1 focus:ring-primary dark:text-white appearance-none">
<option disabled="" selected="" value="">Seçiniz</option>
<option>FOB</option>
<option>EXW</option>
<option>CIF</option>
</select>
</div>
</div>
</section>
</div>
<!-- Footer -->
<div class="border-t border-slate-200 dark:border-slate-800 px-6 py-4 bg-slate-50 dark:bg-slate-900 rounded-b-xl flex items-center justify-end gap-3">
<button class="px-5 py-2.5 text-sm font-medium rounded-lg text-slate-700 dark:text-slate-300 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
                            İptal
                        </button>
<button class="px-5 py-2.5 text-sm font-medium rounded-lg text-white bg-primary hover:bg-primary/90 shadow-sm transition-colors">
                            Kaydet
                        </button>
</div>
</div>
</div>
</div>
</div>
</body></html>
