<!DOCTYPE html>

<html lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nakliye CRM Giriş Yap</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&amp;family=Karla:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1e40af", // Industrial blue requested by user
                        "background-light": "#f6f6f8",
                        "background-dark": "#151220",
                        "slate-50": "#f8fafc",
                        "slate-100": "#f1f5f9",
                        "slate-200": "#e2e8f0",
                        "slate-300": "#cbd5e1",
                        "slate-400": "#94a3b8",
                        "slate-500": "#64748b",
                        "slate-600": "#475569",
                        "slate-700": "#334155",
                        "slate-800": "#1e293b",
                        "slate-900": "#0f172a",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"],
                        "body": ["Karla", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Karla', sans-serif; }
        h1, h2, h3, h4, h5, h6, .font-display { font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased min-h-screen flex flex-col font-body">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden" style="--checkbox-tick-svg: url('data:image/svg+xml,%3csvg viewBox=%270 0 16 16%27 fill=%27rgb(255,255,255)%27 xmlns=%27http://www.w3.org/2000/svg%27%3e%3cpath d=%27M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z%27/%3e%3c/svg%3e');">
<!-- Top Navigation Placeholder (Simplified for Login) -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-6 py-4 lg:px-10">
<div class="flex items-center gap-4 text-primary">
<div class="size-6 flex items-center justify-center">
<span class="material-symbols-outlined text-[28px]">local_shipping</span>
</div>
<h2 class="font-display text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight tracking-tight">Nakliye CRM</h2>
</div>
<div class="flex flex-1 justify-end gap-8">
<a class="text-sm font-medium text-slate-500 hover:text-primary dark:text-slate-400 dark:hover:text-primary transition-colors" href="#">Yardım</a>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col justify-center items-center p-6 sm:p-12">
<div class="w-full max-w-[440px] bg-white dark:bg-slate-900 rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] dark:shadow-[0_8px_30px_rgb(0,0,0,0.2)] border border-slate-100 dark:border-slate-800 overflow-hidden">
<div class="p-8 sm:p-10">
<!-- Header Text -->
<div class="flex flex-col gap-2 text-center mb-8">
<h1 class="font-display text-slate-900 dark:text-slate-100 text-3xl font-extrabold leading-tight tracking-tight">Giriş Yap</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal leading-relaxed">Nakliye CRM'e hoş geldiniz. Lütfen hesabınıza giriş yapın.</p>
</div>
<!-- Form -->
<form action="#" class="flex flex-col gap-5" method="POST">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold leading-normal" for="email">E-posta</label>
<div class="relative flex w-full items-stretch rounded-lg shadow-sm">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-slate-900 dark:text-slate-100 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 focus:border-primary focus:ring-1 focus:ring-primary h-12 placeholder:text-slate-400 pl-10 pr-4 text-sm font-medium leading-normal transition-colors" id="email" name="email" placeholder="ornek@sirket.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold leading-normal" for="password">Şifre</label>
<a class="text-sm font-medium text-primary hover:text-primary/80 transition-colors" href="#">Şifremi unuttum</a>
</div>
<div class="relative flex w-full items-stretch rounded-lg shadow-sm">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-slate-900 dark:text-slate-100 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 focus:border-primary focus:ring-1 focus:ring-primary h-12 placeholder:text-slate-400 pl-10 pr-10 text-sm font-medium leading-normal transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center mt-1">
<label class="flex items-center gap-x-3 cursor-pointer group">
<input class="h-4 w-4 rounded border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-primary checked:bg-primary checked:border-primary focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all cursor-pointer" type="checkbox"/>
<span class="text-slate-600 dark:text-slate-400 text-sm font-medium leading-normal group-hover:text-slate-900 dark:group-hover:text-slate-200 transition-colors">Beni Hatırla</span>
</label>
</div>
<!-- Submit Button -->
<button class="mt-4 flex w-full items-center justify-center rounded-lg bg-primary hover:bg-primary/90 text-white h-12 px-6 text-sm font-bold leading-normal tracking-wide shadow-sm shadow-primary/30 transition-all focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary dark:focus:ring-offset-slate-900 active:scale-[0.98]" type="submit">
                        Giriş Yap
                    </button>
</form>
<!-- Footer / Register Link -->
<div class="mt-8 text-center">
<p class="text-sm text-slate-500 dark:text-slate-400">
                        Hesabınız yok mu? <a class="font-semibold text-primary hover:text-primary/80 transition-colors" href="#">İletişime geçin</a>
</p>
</div>
</div>
<!-- Bottom decorative accent -->
<div class="h-1.5 w-full bg-gradient-to-r from-primary/80 to-primary"></div>
</div>
<!-- Footer Info -->
<div class="mt-8 text-center text-xs text-slate-400 dark:text-slate-500">
            © 2024 Nakliye CRM. Tüm hakları saklıdır.
        </div>
</main>
</div>
</body></html>
