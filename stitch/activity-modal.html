<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Activity Modal - Variant 1</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;family=Karla:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#197fe6",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111921",
                    },
                    fontFamily: {
                        "display": ["Manrope"],
                        "body": ["Karla"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Karla', sans-serif;
        }
        h1, h2, h3, h4, h5, h6, .font-display {
            font-family: 'Manrope', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-900/50 flex items-center justify-center min-h-screen p-4 font-body">
<div class="relative flex h-auto w-full max-w-2xl flex-col bg-background-light dark:bg-background-dark rounded-xl shadow-2xl overflow-hidden group/design-root" style="--select-button-svg: url('data:image/svg+xml,%3csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%2724px%27 height=%2724px%27 fill=%27rgb(100,116,139)%27 viewBox=%270 0 256 256%27%3e%3cpath d=%27M181.66,170.34a8,8,0,0,1,0,11.32l-48,48a8,8,0,0,1-11.32,0l-48-48a8,8,0,0,1,11.32-11.32L128,212.69l42.34-42.35A8,8,0,0,1,181.66,170.34Zm-96-84.68L128,43.31l42.34,42.35a8,8,0,0,0,11.32-11.32l-48-48a8,8,0,0,0-11.32,0l-48,48A8,8,0,0,0,85.66,85.66Z%27%3e%3c/path%3e%3c/svg%3e');">
<!-- Header -->
<div class="flex items-center justify-between px-6 py-5 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-2xl">event_available</span>
<h3 class="text-slate-900 dark:text-slate-100 text-xl font-bold font-display leading-tight tracking-[-0.015em]">Aktivite Ekle/Düzenle</h3>
</div>
<button class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Body -->
<div class="p-6 flex flex-col gap-5 overflow-y-auto max-h-[calc(100vh-160px)]">
<div class="grid grid-cols-1 gap-5">
<label class="flex flex-col flex-1">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-1.5">Bağlı Müşteri</p>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</span>
<select class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-11 bg-[image:--select-button-svg] pl-10 pr-[40px] text-sm font-normal leading-normal transition-all">
<option disabled="" value="">Müşteri Ara veya Seç...</option>
<option selected="" value="1">Acme Lojistik A.Ş.</option>
<option value="2">Global Kargo Ltd.</option>
<option value="3">Hızlı Taşımacılık</option>
</select>
</div>
</label>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-5">
<label class="flex flex-col flex-1">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-1.5">Aktivite Tipi</p>
<select class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-11 bg-[image:--select-button-svg] px-3 pr-[40px] text-sm font-normal leading-normal transition-all">
<option value="phone">📞 Telefon Görüşmesi</option>
<option value="email">✉️ E-posta</option>
<option value="meeting">🤝 Yüz Yüze Toplantı</option>
<option value="video">🎥 Video Konferans</option>
</select>
</label>
<div class="flex gap-4">
<label class="flex flex-col flex-1">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-1.5">Tarih ve Saat</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-11 px-3 text-sm font-normal leading-normal transition-all" type="datetime-local" value="2023-10-24T14:30"/>
</label>
<label class="flex flex-col w-24">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-1.5">Süre (Dk)</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-11 px-3 text-sm font-normal leading-normal transition-all text-center" min="5" step="5" type="number" value="30"/>
</label>
</div>
</div>
<div class="grid grid-cols-1 gap-5">
<label class="flex flex-col flex-1">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-1.5 flex items-center gap-1.5">
                        Görüşme Notu
                    </p>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-3 text-slate-400">speaker_notes</span>
<textarea class="form-input flex w-full min-w-0 flex-1 resize-none rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 min-h-[120px] placeholder:text-slate-400 pl-10 p-3 text-sm font-normal leading-normal transition-all" placeholder="Detaylı görüşme notlarınızı buraya girebilirsiniz..."></textarea>
</div>
</label>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-5 pt-2 border-t border-slate-200 dark:border-slate-800">
<label class="flex flex-col flex-1">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-1.5">Sonuç</p>
<select class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-11 bg-[image:--select-button-svg] px-3 pr-[40px] text-sm font-normal leading-normal transition-all">
<option disabled="" selected="" value="">Sonuç Seçin...</option>
<option value="positive">🟢 Olumlu</option>
<option value="neutral">⚪ Nötr</option>
<option value="negative">🔴 Olumsuz</option>
<option value="quote">📄 Teklif İstendi</option>
</select>
</label>
<label class="flex flex-col flex-1">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal pb-1.5">Sonraki Aksiyon Tarihi</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 h-11 px-3 text-sm font-normal leading-normal transition-all" type="date"/>
</label>
</div>
</div>
<!-- Footer -->
<div class="flex items-center justify-end gap-3 px-6 py-4 bg-slate-50 dark:bg-slate-900/50 border-t border-slate-200 dark:border-slate-800">
<button class="px-5 py-2.5 rounded-lg text-slate-600 dark:text-slate-300 font-medium text-sm hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                İptal
            </button>
<button class="px-6 py-2.5 rounded-lg bg-primary text-white font-medium text-sm hover:bg-primary/90 focus:ring-4 focus:ring-primary/20 transition-all flex items-center gap-2">
<span class="material-symbols-outlined text-[20px]">save</span>
                Kaydet
            </button>
</div>
</div>
</body></html>
