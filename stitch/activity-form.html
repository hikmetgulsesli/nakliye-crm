<!DOCTYPE html>

<html lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Yeni Aktivite Ekleme Modalı - Nakliye CRM</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;family=Karla:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"],
                        "body": ["Karla", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .select-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            padding-right: 2.5rem;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
            appearance: none;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-body text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">
<!-- Modal Backdrop -->
<div class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-40 transition-opacity flex items-center justify-center">
<!-- Modal Container -->
<div class="bg-white dark:bg-slate-800 rounded-xl shadow-2xl w-full max-w-2xl flex flex-col max-h-[90vh] overflow-hidden z-50">
<!-- Modal Header -->
<div class="flex items-center justify-between border-b border-slate-200 dark:border-slate-700 px-6 py-4 bg-slate-50 dark:bg-slate-800/50">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">add_task</span>
</div>
<h2 class="font-display text-xl font-bold text-slate-900 dark:text-white">Yeni Aktivite Ekle</h2>
</div>
<button class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Modal Body (Scrollable) -->
<div class="p-6 overflow-y-auto flex-1 space-y-6">
<!-- Row 1: Müşteri -->
<div class="flex flex-col gap-2">
<label class="font-medium text-sm text-slate-700 dark:text-slate-300 flex items-center gap-2">
<span class="material-symbols-outlined text-sm text-slate-400">domain</span>
                        Müşteri
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">search</span>
<input class="w-full pl-10 pr-4 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700/50 focus:ring-2 focus:ring-primary/20 focus:border-primary text-sm dark:text-white placeholder:text-slate-400" placeholder="Müşteri Ara... (örn: Lojistik A.Ş.)" type="text"/>
</div>
</div>
<!-- Row 2: Aktivite Tipi -->
<div class="flex flex-col gap-2">
<label class="font-medium text-sm text-slate-700 dark:text-slate-300 flex items-center gap-2">
<span class="material-symbols-outlined text-sm text-slate-400">category</span>
                        Aktivite Tipi
                    </label>
<select class="select-icon w-full pl-3 pr-10 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700/50 focus:ring-2 focus:ring-primary/20 focus:border-primary text-sm dark:text-white">
<option disabled="" selected="" value="">Aktivite Tipi Seçin</option>
<option value="phone">📞 Telefon Görüşmesi</option>
<option value="email">✉️ E-posta</option>
<option value="meeting">🤝 Yüz Yüze Görüşme</option>
<option value="video">📹 Video Görüşme</option>
</select>
</div>
<!-- Row 3: Tarih & Saat & Süre -->
<div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
<div class="flex flex-col gap-2">
<label class="font-medium text-sm text-slate-700 dark:text-slate-300 flex items-center gap-2">
<span class="material-symbols-outlined text-sm text-slate-400">calendar_today</span>
                            Tarih
                        </label>
<input class="w-full px-3 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700/50 focus:ring-2 focus:ring-primary/20 focus:border-primary text-sm dark:text-white" type="date"/>
</div>
<div class="flex flex-col gap-2">
<label class="font-medium text-sm text-slate-700 dark:text-slate-300 flex items-center gap-2">
<span class="material-symbols-outlined text-sm text-slate-400">schedule</span>
                            Saat
                        </label>
<input class="w-full px-3 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700/50 focus:ring-2 focus:ring-primary/20 focus:border-primary text-sm dark:text-white" type="time"/>
</div>
<div class="flex flex-col gap-2">
<label class="font-medium text-sm text-slate-700 dark:text-slate-300 flex items-center gap-2">
<span class="material-symbols-outlined text-sm text-slate-400">timer</span>
                            Süre
                        </label>
<input class="w-full px-3 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700/50 focus:ring-2 focus:ring-primary/20 focus:border-primary text-sm dark:text-white" placeholder="30 dk" type="text"/>
</div>
</div>
<!-- Row 4: Notlar -->
<div class="flex flex-col gap-2">
<label class="font-medium text-sm text-slate-700 dark:text-slate-300 flex items-center gap-2">
<span class="material-symbols-outlined text-sm text-slate-400">notes</span>
                        Notlar
                    </label>
<textarea class="w-full px-3 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700/50 focus:ring-2 focus:ring-primary/20 focus:border-primary text-sm dark:text-white resize-none" placeholder="Görüşme detaylarını buraya ekleyin..." rows="4"></textarea>
</div>
<!-- Row 5: Sonuç & Sonraki Aksiyon -->
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
<div class="flex flex-col gap-2">
<label class="font-medium text-sm text-slate-700 dark:text-slate-300 flex items-center gap-2">
<span class="material-symbols-outlined text-sm text-slate-400">fact_check</span>
                            Sonuç
                        </label>
<select class="select-icon w-full pl-3 pr-10 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700/50 focus:ring-2 focus:ring-primary/20 focus:border-primary text-sm dark:text-white">
<option disabled="" selected="" value="">Sonuç Seçin</option>
<option value="positive">Olumlu</option>
<option value="neutral">Nötr</option>
<option value="negative">Olumsuz</option>
<option value="proposal">Teklif İstendi</option>
</select>
</div>
<div class="flex flex-col gap-2">
<label class="font-medium text-sm text-slate-700 dark:text-slate-300 flex items-center gap-2">
<span class="material-symbols-outlined text-sm text-slate-400">event_upcoming</span>
                            Sonraki Aksiyon Tarihi
                        </label>
<input class="w-full px-3 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700/50 focus:ring-2 focus:ring-primary/20 focus:border-primary text-sm dark:text-white" type="date"/>
</div>
</div>
</div>
<!-- Modal Footer -->
<div class="border-t border-slate-200 dark:border-slate-700 px-6 py-4 bg-slate-50 dark:bg-slate-800/50 flex justify-end gap-3">
<button class="px-5 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200 font-medium text-sm hover:bg-slate-50 dark:hover:bg-slate-600 transition-colors focus:outline-none focus:ring-2 focus:ring-slate-200 dark:focus:ring-slate-600" type="button">
                    İptal
                </button>
<button class="px-5 py-2.5 rounded-lg bg-primary text-white font-medium text-sm hover:bg-primary/90 transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-primary/50 flex items-center gap-2" type="button">
<span class="material-symbols-outlined text-[18px]">save</span>
                    Kaydet
                </button>
</div>
</div>
</div>
</body></html>
